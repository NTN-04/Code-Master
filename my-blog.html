<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài viết của tôi | CodeMaster</title>
    <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/my-blog.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- SimpleMDE CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css"
    />
    <!-- SimpleMDE JS -->
    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
  </head>
  <body>
    <!-- Header component -->
    <header id="header-placeholder"></header>

    <!-- Main content -->
    <main class="my-blog-wrapper">
      <div class="my-blog-header">
        <h1 class="my-blog-title">Bài viết của tôi</h1>
        <div class="my-blog-actions">
          <button id="open-post-modal" class="btn btn-primary">
            <i class="fa fa-plus"></i> Đăng bài
          </button>
          <a class="blog-back">
            <i class="fas fa-arrow-left"></i> Trở lại Blog
          </a>
        </div>
      </div>

      <div class="my-blog-content">
        <!-- User sidebar -->
        <aside class="user-profile-sidebar">
          <div class="user-profile-header">
            <div class="user-avatar-container">
              <img id="user-avatar" src="" alt="User Avatar" />
            </div>
            <div class="user-info">
              <h3 id="user-name">User Name</h3>
              <p id="user-email">user@example.com</p>
            </div>
          </div>

          <!-- Blog trạng thái lọc -->
          <div class="status-filter">
            <button data-status="all" class="active">
              <span>Tất cả bài viết</span>
              <span class="status-count" id="all-count">0</span>
            </button>
            <button data-status="published">
              <span>Đã xuất bản</span>
              <span class="status-count" id="published-count">0</span>
            </button>
            <button data-status="pending">
              <span>Chờ duyệt</span>
              <span class="status-count" id="pending-count">0</span>
            </button>
          </div>
        </aside>

        <!-- Nội dung blog -->
        <div class="blog-content-area">
          <!-- Search bar -->
          <div class="blog-search-bar">
            <input
              type="text"
              id="search-input"
              placeholder="Tìm kiếm bài viết của bạn..."
            />
            <button id="search-btn">
              <i class="fas fa-search"></i>
            </button>
          </div>

          <!-- Danh sách blog -->
          <ul class="blog-list" id="blog-list">
            <!-- render động JS -->
          </ul>

          <!-- Thông báo k có blog -->
          <div id="no-posts-message">
            <i class="far fa-file-alt"></i>
            <h3>Không có bài viết nào</h3>
            <p>
              Bạn chưa có bài viết nào hoặc không có bài viết nào phù hợp với bộ
              lọc hiện tại.
            </p>
          </div>
          <!-- phân trang -->
          <div class="blog-pagination" id="blog-pagination"></div>
        </div>
      </div>
    </main>

    <!-- Modal edit blog -->
    <div id="edit-blog-modal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close-modal" id="close-edit-modal">&times;</span>
        <h2>Chỉnh sửa bài viết</h2>
        <form id="edit-blog-form">
          <div class="form-sidebar">
            <input type="text" id="edit-title" placeholder="Tiêu đề" required />
            <input
              type="text"
              id="edit-tags"
              placeholder="Tags (cách nhau bởi dấu phẩy)"
            />
            <input type="file" id="edit-image" accept="image/*" />
            <!-- preview ảnh khi upload -->
            <img
              id="edit-image-preview"
              style="
                display: none;
                max-width: 90%;
                margin: 10px 0;
                border-radius: 8px;
              "
            />
          </div>
          <div class="blog-main-content">
            <textarea
              id="edit-content"
              placeholder="Nội dung (Markdown)"
            ></textarea>
            <button type="submit" class="btn btn-success">Lưu thay đổi</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal đăng bài mới -->
    <div id="post-modal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close-modal" id="close-post-modal">&times;</span>
        <h2>Đăng bài viết mới</h2>
        <form id="blog-post-form">
          <div class="form-sidebar">
            <input type="text" id="post-title" placeholder="Tiêu đề" required />
            <input
              type="text"
              id="post-tags"
              placeholder="Tags (cách nhau bởi dấu phẩy)"
            />
            <input type="file" id="post-image" accept="image/*" />
            <!-- preview ảnh khi upload -->
            <img
              id="post-image-preview"
              style="
                display: none;
                max-width: 90%;
                margin: 10px 0;
                border-radius: 8px;
              "
            />
          </div>
          <div class="blog-main-content">
            <textarea
              id="post-content"
              placeholder="Nội dung (Markdown)"
            ></textarea>
            <button type="submit" class="btn btn-success">Đăng bài</button>
          </div>
        </form>
      </div>
    </div>
    <!-- Footer component -->
    <footer id="footer-placeholder"></footer>

    <!-- Scripts -->
    <script src="./assets/js/components.js"></script>
    <script type="module" src="./assets/js/auth.js"></script>
    <script type="module" src="./assets/js/my-blog.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết khóa học | CodeMaster</title>
    <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/course.css" />
    <link rel="stylesheet" href="./assets/css/comments.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- load với component -->
    <header id="header-placeholder"></header>

    <section class="course-header">
      <div class="container">
        <div class="course-info">
          <h1 class="course-info-title"></h1>
          <div class="course-meta">
            <span class="level beginner"></span>
            <span class="duration"> </span>
            <span class="lessons"> </span>
          </div>
          <p></p>
        </div>
      </div>
    </section>

    <section class="course-content">
      <div class="container">
        <div class="course-layout">
          <div class="course-sidebar">
            <div class="progress-tracker">
              <h3>Tiến Độ Của Bạn</h3>
              <div class="progress-container">
                <div
                  class="progress-bar"
                  data-progress="0"
                  id="course-main-progress"
                >
                  <div class="progress"></div>
                </div>
                <span class="progress-text">0% Hoàn Thành</span>
              </div>
            </div>

            <div class="module-list">
              <h3>Các Chương Học</h3>
              <ul>
                <!-- Đổ dữ liệu vào từ firebase -->
              </ul>
            </div>
          </div>

          <div class="course-main">
            <div class="lesson-content" id="lesson-welcome">
              <div class="welcome-banner">
                <div class="banner-content">
                  <h1 class="course-info-title">
                    Chào mừng bạn đến với khóa học!
                  </h1>
                  <p class="banner-subtitle">
                    Hãy bắt đầu hành trình học tập của bạn tại CodeMaster.
                  </p>
                  <a href="#" class="btn btn-primary" id="start-course"
                    >Bắt Đầu Khóa Học</a
                  >
                </div>
                <div class="banner-image">
                  <img src="assets/images/logo-01.svg" alt="${banner.title}" />
                </div>
              </div>
            </div>
            <div class="lesson-container">
              <!-- Nội dung bài học sẽ được render động từ JS -->
            </div>
            <!-- Phần bình luận khóa học -->
            <div class="comments-overlay"></div>
            <div class="comments-panel" id="course-comments-panel"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ChatBot AI -->
    <div id="ai-chatbot">
      <div id="ai-chat-header">
        <span>Trợ lý AI</span>
        <button id="ai-chat-close">&times;</button>
      </div>
      <div id="ai-chat-messages"></div>
      <form id="ai-chat-form">
        <input
          type="text"
          id="ai-chat-input"
          placeholder="Hỏi về bài học..."
          autocomplete="off"
        />
        <button type="submit"><i class="fas fa-paper-plane"></i></button>
      </form>
      <button id="ai-chat-open"><i class="fas fa-robot"></i> Chat AI</button>
    </div>

    <!-- load bằng components -->
    <footer id="footer-placeholder"></footer>

    <script src="./assets/js/script.js"></script>
    <script type="module" src="./assets/js/course.js"></script>
    <!-- thư viện marked.js để convert AI sang HTML  -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./assets/js/chat-ai.js"></script>
    <script src="./assets/js/components.js"></script>
    <script type="module" src="./assets/js/auth.js"></script>
  </body>
</html>
